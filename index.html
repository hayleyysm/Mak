<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <title>Birthday Adventure</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="site-shell">
    <section class="loading-screen" aria-label="Loading birthday adventure">
      <div class="loading-glow loading-glow-one"></div>
      <div class="loading-glow loading-glow-two"></div>

      <div class="loose-balloons" aria-hidden="true">
        <img class="loose-balloon loose-balloon-one" src="assets/images/Loading%20Screen/B1.png" alt="">
        <img class="loose-balloon loose-balloon-two" src="assets/images/Loading%20Screen/B2.png" alt="">
        <img class="loose-balloon loose-balloon-three" src="assets/images/Loading%20Screen/B3.png" alt="">
        <img class="loose-balloon loose-balloon-four" src="assets/images/Loading%20Screen/B4.png" alt="">
        <img class="loose-balloon loose-balloon-five" src="assets/images/Loading%20Screen/B5.png" alt="">
        <img class="loose-balloon loose-balloon-six" src="assets/images/Loading%20Screen/B6.png" alt="">
      </div>

      <div class="floating-rig" aria-hidden="true">
        <div class="rig-piece piece-balloons">
          <img src="assets/images/Loading%20Screen/Balloon%20Cluster.png" alt="">
        </div>
        <div class="rig-piece piece-house">
          <img src="assets/images/Loading%20Screen/House.png" alt="">
        </div>
        <div class="rig-piece piece-character">
          <img src="assets/images/Loading%20Screen/Character.png" alt="">
        </div>
      </div>

      <div class="loading-copy">
        <p class="loading-kicker">packing the adventure</p>
        <div class="loading-bar" aria-hidden="true">
          <span></span>
        </div>
      </div>
    </section>

    <section class="home-screen" aria-label="Birthday mailbox scene">
      <div class="cloud-stage" aria-hidden="true">
        <img class="cloud cloud-one" src="assets/images/Home%20Screen/Cloud%201.png" alt="">
        <img class="cloud cloud-two" src="assets/images/Home%20Screen/Cloud%202.png" alt="">
        <img class="cloud cloud-three" src="assets/images/Home%20Screen/Cloud%203.png" alt="">
        <img class="cloud cloud-four" src="assets/images/Home%20Screen/Cloud%204.png" alt="">
        <img class="cloud cloud-five" src="assets/images/Home%20Screen/Cloud%205.png" alt="">
        <img class="cloud cloud-six" src="assets/images/Home%20Screen/Cloud%206.png" alt="">
      </div>
      <div class="firefly-stage" aria-hidden="true">
        <span class="firefly firefly-one"></span>
        <span class="firefly firefly-two"></span>
        <span class="firefly firefly-three"></span>
        <span class="firefly firefly-four"></span>
        <span class="firefly firefly-five"></span>
        <span class="firefly firefly-six"></span>
        <span class="firefly firefly-seven"></span>
        <span class="firefly firefly-eight"></span>
      </div>
      <div class="mail-note" aria-label="You've got mail">
        <p class="mail-note-text">you've got mail <span>&hearts;</span></p>
        <span class="mail-arrow" aria-hidden="true">↓</span>
      </div>
      <img class="mailbox-layer" src="assets/images/Home%20Screen/Mailbox%20Closed.png" alt="">
      <button class="mailbox-button" type="button" aria-label="Open the mailbox"></button>
      <img class="envelope-layer" src="assets/images/Home%20Screen/Closed%20Envelope.png" alt="">
      <button class="envelope-button" type="button" aria-label="Open the envelope"></button>
      <img class="button-page-layer" src="assets/images/Home%20Screen/Button%20Page.png" alt="">
      <img class="button-action-layer music-button-layer" src="assets/images/Home%20Screen/Music%20Button.png" alt="">
      <img class="button-action-layer animation-button-layer" src="assets/images/Home%20Screen/Animation%20Button.png" alt="">
      <a class="button-page-link music-button-link" href="pages/music.html/index.html" aria-label="Open Mak Tunes"></a>
      <a class="button-page-link animation-button-link" href="pages/story.html/index.html" aria-label="Open Mak Musings"></a>
      <img class="letter-layer" src="assets/images/Home%20Screen/Letter.png" alt="">
      <button class="paper-hitbox letter-hitbox" type="button" aria-label="Show the button page"></button>
      <button class="paper-hitbox button-page-hitbox" type="button" aria-label="Show the letter page"></button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
